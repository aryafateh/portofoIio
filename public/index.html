<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabunganku Cloud - tabungan-prediksi</title>

        <!-- Bagian Favicon (Ikon di Tab Browser) -->
    <!-- Kita menggunakan Emoji sebagai ikon agar praktis tanpa file gambar eksternal -->
    <link rel="icon" href="https://fav.farm/💰">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Auth Overlay (Layar Login) -->
    <div id="auth-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-lg z-50 flex items-center justify-center p-4 transition-all duration-500">
        <div class="bg-white rounded-[2rem] p-10 max-w-md w-full shadow-2xl text-center">
            <div class="inline-flex p-5 bg-blue-50 rounded-3xl mb-4 text-5xl">💰</div>
            <h2 class="text-3xl font-extrabold tracking-tight">Tabunganku</h2>
            <p class="text-slate-500 mt-2 mb-8">Gunakan akun Google untuk sinkronisasi cloud</p>
            
            <button id="login-google-btn" class="w-full flex items-center justify-center gap-4 bg-white border-2 border-slate-100 hover:border-blue-200 hover:bg-blue-50 text-slate-700 font-bold py-4 px-6 rounded-2xl transition-all shadow-sm active:scale-[0.97]">
                <svg class="w-6 h-6" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Masuk dengan Google
            </button>
            
            <div id="error-box" class="hidden mt-4 p-3 bg-red-50 border border-red-100 rounded-xl text-red-600 text-xs text-left font-medium"></div>
        </div>
    </div>

    <!-- Navigasi -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 sticky top-0 z-40">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-600 flex items-center gap-2"><span><img src="logo.svg" class="w-6 h-6 mr-2"></span> Tabunganku</h1>
            <div id="user-nav" class="hidden flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="text-sm font-bold leading-tight"></p>
                    <p id="user-email" class="text-[10px] text-slate-500"></p>
                </div>
                <img id="user-photo" src="" class="w-10 h-10 rounded-full border-2 border-blue-100 shadow-sm">
                <button id="logout-btn" class="ml-2 p-2 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-xl transition">Keluar</button>
            </div>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main id="app-content" class="container mx-auto px-4 py-8 opacity-0 transition-opacity duration-700 pointer-events-none">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-blue-600 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
                    <p class="text-blue-100 text-xs font-bold uppercase tracking-widest opacity-80">Saldo Cloud</p>
                    <h2 id="total-balance" class="text-4xl font-black mt-2 tracking-tight">Rp 0</h2>
                </div>

                <div class="bg-white border border-slate-200 rounded-[2rem] p-6 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-5">Tambah Tabungan</h3>
                    <div class="space-y-4">
                        <input type="number" id="input-amount" class="w-full p-4 bg-slate-50 rounded-2xl border focus:border-blue-500 outline-none font-bold" placeholder="Nominal">
                        <input type="text" id="input-note" class="w-full p-4 bg-slate-50 rounded-2xl border focus:border-blue-500 outline-none" placeholder="Keterangan">
                        <button id="add-btn" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-4 rounded-2xl transition-all">Simpan Ke Cloud</button>
                    </div>
                </div>

                <div class="bg-white border border-slate-200 rounded-[2rem] p-6 shadow-sm h-[400px] flex flex-col">
                    <h3 class="font-bold text-slate-800 mb-5">Riwayat Cloud</h3>
                    <div id="history-list" class="space-y-3 overflow-y-auto flex-1 pr-2"></div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white border border-slate-200 rounded-[2.5rem] p-8 shadow-sm">
                    <h3 class="font-black text-2xl text-slate-800 mb-10">🔮 Simulator Target</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                        <div class="space-y-8">
                            <div>
                                <label class="block text-sm font-bold mb-3">Setoran Bulanan (Input Angka)</label>
                                <input type="number" id="monthly-target-input" value="500000" class="w-full p-4 bg-slate-50 rounded-2xl border focus:border-blue-500 outline-none font-bold mb-4 text-blue-600">
                                <input type="range" id="monthly-target-range" min="0" max="10000000" step="100000" value="500000" class="w-full h-2 bg-slate-100 rounded-lg accent-blue-600">
                            </div>
                            <div>
                                <label class="flex justify-between text-sm font-bold mb-3">Durasi Prediksi <span id="months-label" class="text-blue-600">12 Bulan</span></label>
                                <input type="range" id="prediction-months" min="1" max="60" value="12" class="w-full h-2 bg-slate-100 rounded-lg accent-blue-600">
                            </div>
                        </div>
                        <div class="bg-slate-50 p-8 rounded-[2rem] border text-center flex flex-col justify-center">
                            <p class="text-slate-400 text-[10px] font-black uppercase mb-3">Estimasi Saldo Akhir</p>
                            <p id="predicted-total" class="text-4xl font-black text-slate-900">Rp 0</p>
                        </div>
                    </div>
                    <div class="h-[300px]"><canvas id="predictionChart"></canvas></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrLxmvcCf40ETqtYT98dO2uF6ZrPNF5iY",
            authDomain: "tabungan-prediksi.firebaseapp.com",
            projectId: "tabungan-prediksi",
            storageBucket: "tabungan-prediksi.firebasestorage.app",
            messagingSenderId: "101325344338",
            appId: "1:101325344338:web:7cb5da9f8abc6112e6598b",
            measurementId: "G-LE32H4R19P"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = "tabungan-prediksi-web-v1";

        let transactions = [];
        let chartInstance = null;

        const formatIDR = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);

        const loginBtn = document.getElementById('login-google-btn');
        const errorBox = document.getElementById('error-box');

        loginBtn.onclick = async () => {
            errorBox.classList.add('hidden');
            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                console.error("Login Error:", err);
                errorBox.classList.remove('hidden');
                if (err.code === 'auth/unauthorized-domain') {
                    errorBox.innerHTML = `<b>Domain Belum Diizinkan!</b><br>Buka Firebase Console > Authentication > Settings > Authorized Domains.`;
                } else {
                    errorBox.innerText = `Error: ${err.message}`;
                }
            }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const overlay = document.getElementById('auth-overlay');
            const main = document.getElementById('app-content');
            if (user) {
                overlay.classList.add('opacity-0', 'pointer-events-none');
                main.classList.remove('opacity-0', 'pointer-events-none');
                document.getElementById('user-nav').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-photo').src = user.photoURL;
                listenToData(user.uid);
            } else {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                main.classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('user-nav').classList.add('hidden');
            }
        });

        function listenToData(uid) {
            const q = query(
                collection(db, 'artifacts', appId, 'users', uid, 'transactions'),
                orderBy('createdAt', 'desc')
            );
            
            onSnapshot(q, (snapshot) => {
                transactions = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
            }, (err) => {
                console.error("Firestore Error:", err);
            });
        }

        document.getElementById('add-btn').onclick = async () => {
            const amountInput = document.getElementById('input-amount');
            const noteInput = document.getElementById('input-note');
            const amount = parseInt(amountInput.value);
            const note = noteInput.value;

            if (!amount || isNaN(amount) || !auth.currentUser) return;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'transactions'), {
                    amount,
                    note: note || 'Tabungan',
                    createdAt: serverTimestamp()
                });
                amountInput.value = '';
                noteInput.value = '';
            } catch (err) {
                alert("Gagal: " + err.message);
            }
        };

        window.delTx = async (id) => {
            if (confirm("Hapus catatan ini?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'transactions', id));
            }
        };

        function updateUI() {
            const total = transactions.reduce((s, t) => s + t.amount, 0);
            document.getElementById('total-balance').innerText = formatIDR(total);
            
            document.getElementById('history-list').innerHTML = transactions.map(t => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                    <div>
                        <p class="font-bold text-sm text-slate-700">${t.note}</p>
                        <p class="text-[10px] text-slate-400">Cloud Sync</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-blue-600 font-black text-sm">+${t.amount.toLocaleString()}</span>
                        <button onclick="delTx('${t.id}')" class="text-slate-300 hover:text-red-500">✕</button>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-slate-400 text-xs mt-10">Belum ada data</p>';
            
            calcPredict();
        }

        // --- Logika Simulator ---
        const monthlyInput = document.getElementById('monthly-target-input');
        const monthlyRange = document.getElementById('monthly-target-range');
        const monthsRange = document.getElementById('prediction-months');

        // Sinkronkan Input Angka ke Slider
        monthlyInput.oninput = () => {
            monthlyRange.value = monthlyInput.value;
            calcPredict();
        };

        // Sinkronkan Slider ke Input Angka
        monthlyRange.oninput = () => {
            monthlyInput.value = monthlyRange.value;
            calcPredict();
        };

        monthsRange.oninput = () => {
            document.getElementById('months-label').innerText = `${monthsRange.value} Bulan`;
            calcPredict();
        };

        function calcPredict() {
            const monthly = parseInt(monthlyInput.value) || 0;
            const months = parseInt(monthsRange.value);
            const current = transactions.reduce((s, t) => s + t.amount, 0);
            const total = monthly * months;
            
            document.getElementById('predicted-total').innerText = formatIDR(total);
            renderChart(current, monthly, months);
        }

        function renderChart(start, monthly, duration) {
            const ctx = document.getElementById('predictionChart').getContext('2d');
            const labels = Array.from({length: duration + 1}, (_, i) => `${i} Bln`);
            const data = labels.map((_, i) => start + (monthly * i));

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{ 
                        data, 
                        borderColor: '#2563eb', 
                        borderWidth: 3, 
                        pointRadius: 0, 
                        fill: true, 
                        backgroundColor: 'rgba(37, 99, 235, 0.05)', 
                        tension: 0.4 
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { callback: (val) => 'Rp ' + (val / 1000000).toFixed(1) + 'jt' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
